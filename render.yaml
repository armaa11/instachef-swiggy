# Render deployment manifest for the InstaChef AI project.
# This config points to the flat folders at the root (backend/ and frontend/).

services:
  - type: web_service
    name: instachef-backend
    env: docker
    branch: main
    region: oregon
    plan: starter
    dockerfilePath: backend/Dockerfile
    rootDir: backend
    envVars:
      - key: REDIS_URL
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: SWIGGY_CLIENT_ID
        value: ""
      - key: SWIGGY_CLIENT_SECRET
        value: ""
      - key: DATABASE_URL
        value: ""

  - type: web_service
    name: instachef-frontend
    env: node
    branch: main
    region: oregon
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ""
